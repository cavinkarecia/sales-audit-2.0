# Render Blueprint — deploy Sentinel (frontend + backend + database)
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: sentinel-db
    plan: free
    databaseName: sentinel
    user: sentinel

services:
  - type: web
    name: sentinel
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: sentinel-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_PASSWORD
        sync: false
      # AI key is pasted in the app (AI Key chip) — do NOT set ANTHROPIC_API_KEY on Render
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
